name: Feature request
description: Propose an improvement to the QuestFit experience.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user need would this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed experience
      description: Describe the user-visible behavior rather than only an implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?
  - type: dropdown
    id: area
    attributes:
      label: Product area
      options:
        - Planning and personalization
        - Pose and calibration
        - Mission gameplay
        - Results and coaching
        - Accessibility and responsive UI
        - Privacy, reliability, or security
        - Documentation or developer experience
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Project boundaries
      options:
        - label: This proposal preserves on-device webcam processing and deterministic scoring.
          required: true
